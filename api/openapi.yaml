            --url https://us1.pdfgeneratorapi.com/api/v4/status \
            --header 'Authorization: Bearer REPLACE_BEARER_TOKEN'
      - lang: Shell + Wget
        source: |-
          wget --quiet \
            --method GET \
            --header 'Authorization: Bearer REPLACE_BEARER_TOKEN' \
            --output-document \
            - https://us1.pdfgeneratorapi.com/api/v4/status
      - lang: Php + Curl
        source: |-
          <?php

          $curl = curl_init();

          curl_setopt_array($curl, [
            CURLOPT_URL => "https://us1.pdfgeneratorapi.com/api/v4/status",
            CURLOPT_RETURNTRANSFER => true,
            CURLOPT_ENCODING => "",
            CURLOPT_MAXREDIRS => 10,
            CURLOPT_TIMEOUT => 30,
            CURLOPT_HTTP_VERSION => CURL_HTTP_VERSION_1_1,
            CURLOPT_CUSTOMREQUEST => "GET",
            CURLOPT_HTTPHEADER => [
              "Authorization: Bearer REPLACE_BEARER_TOKEN"
            ],
          ]);

          $response = curl_exec($curl);
          $err = curl_error($curl);

          curl_close($curl);

          if ($err) {
            echo "cURL Error #:" . $err;
          } else {
            echo $response;
          }
