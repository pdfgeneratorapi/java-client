          const options = {
            "method": "GET",
            "hostname": "us1.pdfgeneratorapi.com",
            "port": null,
            "path": "/api/v4/status",
            "headers": {
              "Authorization": "Bearer REPLACE_BEARER_TOKEN"
            }
          };

          const req = http.request(options, function (res) {
            const chunks = [];

            res.on("data", function (chunk) {
              chunks.push(chunk);
            });

            res.on("end", function () {
              const body = Buffer.concat(chunks);
              console.log(body.toString());
            });
          });

          req.end();
      - lang: Node + Request
        source: |
