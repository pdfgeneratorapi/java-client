          });
      - lang: Python + Python3
        source: |-
          import http.client

          conn = http.client.HTTPSConnection("us1.pdfgeneratorapi.com")

          headers = { 'Authorization': "Bearer REPLACE_BEARER_TOKEN" }

          conn.request("GET", "/api/v4/status", headers=headers)

